<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Quetzal - Buscador</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Pokémon Quetzal v8.4 DATABASE</h1>
    
    <!-- Pestañas -->
    <div class="tabs">
      <button class="tab active" data-tab="pokemon">Pokémon</button>
      <button class="tab" data-tab="objetos">Objetos</button>
    </div>

    <input type="text" id="search" placeholder="Busca por nombre o número..." class="search-input">

    <div id="results" class="results-grid"></div>
  </div>

  <!-- MODAL -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
