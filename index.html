<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Quetzal Database</title>
  <link rel="icon" type="image/png" href="Icono.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background-glow"></div>
  <div class="bg-pokeball left"></div>
  <div class="bg-pokeball right"></div>
  <div class="particles">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <div class="container">
    <header class="hero">
      <div class="logo-circle">
        <img src="https://raw.githubusercontent.com/nellyama7w7/QuetzalSprites/main/PokemonSprites/RAYQUAZA.png" 
             alt="Quetzal Logo" 
             style="width:85px; height:85px; image-rendering:pixelated;">
      </div>
      <h1>
        Pokémon
        <span>Quetzal</span>
      </h1>
      <p class="subtitle">
        Database v1.0
      </p>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="pokemon">Pokémon</button>
      <button class="tab" data-tab="objetos">Objetos</button>
      <button class="tab" data-tab="habilidades">Habilidades</button>
      <button class="tab" data-tab="creditos">Créditos</button>
    </div>

    <input
      type="text"
      id="search"
      placeholder="Buscar Pokémon, número, objeto, habilidad..."
      class="search-input"
    >

    <div id="results" class="results-grid"></div>
  </div>

  <!-- Modal -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
